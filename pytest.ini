[pytest]
pythonpath = .
testpaths = tests
filterwarnings =
    ignore::DeprecationWarning
markers =
    framework: framework-level invariants (always run regardless of current step)
    step2: foundational primitives (safe_log_ratio, log_return, eps_safe_div, log1p_vol, clip_pos)
    step3: rolling primitives (rolling_mean, rolling_std_pop, rolling_sum, rolling_min, rolling_max)
    step4: composite primitives (ewm_mean, rs_variance, z_score_rolling)
    step5: custom primitives (population_corr, wilder_smooth)
    step6: specialized primitives (rolling_quantile, rolling_mad, perm_entropy_m3, signed_run)
    step7: lag + rolling families port
    step8: volatility families port
    step9: candle/trend/activity/event/seasonality port
    step10: correlations + entropy port
    step11: derivatives port
    step12: Tier-2 port (excursion, liquidity)
    step13: boundary stages port (past-target, barrier, block)
    step14: quality + labels + weights port
    step15: notebook cut-over and legacy compute_* deletion
    analytics_phase0: bootstrap primitives + certified core metrics
    analytics_phase1: fast-iter training + prediction cache
    analytics_phase2: curves with bootstrap bands + time-degradation diagnostics
    analytics_phase3: tail/edge analysis (Net-EV vs trades-per-day, threshold sweep, Kelly, partial-AUC, lift)
    analytics_phase4: SHAP cohort decomposition (TP/FP/TN/FN)
    analytics_phase5: CatBoost virtual-ensemble uncertainty
    analytics_phase6: production trading audits
