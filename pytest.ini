[pytest]
pythonpath = .
testpaths = tests
filterwarnings =
    ignore::DeprecationWarning
    # Legacy step*/analytics_phase*/strategy_v1 markers still appear as
    # ``pytestmark = ...`` lines in individual test files (other agents
    # may be editing those files concurrently). They no longer drive
    # selection — that's done by the path-based map in conftest.py —
    # but pytest still warns. Silence those warnings here.
    ignore::pytest.PytestUnknownMarkWarning
markers =
    framework: cross-cutting invariants (always run regardless of theme filter)
    labels: barrier-label domain (spec, vectorized kernel, block; tests/labels/)
    weights: sample-weight blocks (barrier-distance, time-discount, uniqueness; tests/weights/)
    market: market-data domain (RawBars validation + gap repair; tests/market/)
    data: external feed service (store, writer, feed-source consumer; tests/data/)
    features_primitives: primitive-level feature ops (tests/features/test_primitives.py, test_rolling_primitives.py, test_composite_primitives.py, test_custom_primitives.py, test_specialized_primitives.py)
    features_families: per-family feature ports (tests/features/test_family_*.py)
    features_pipeline: boundary stages + quality + end-to-end pipeline (tests/features/test_boundary.py, test_quality.py, test_pipeline.py, test_cadence_helpers.py)
    analytics_bootstrap: bootstrap primitives + propagation + metric / sampling helpers
    analytics_metrics: curves, time-degradation, edge / threshold diagnostics
    analytics_audits: production-trading audit checks
    analytics_cohorts: SHAP cohort decomposition
    analytics_uncertainty: CatBoost virtual-ensemble uncertainty
    analytics_fast_train: fast-iter training + prediction cache
    strategy: selective-classification policy + order-by-order backtest
    engine: live engine (guards, buffer, sources, store, registry, live trader, retrain, e2e)
    engine_slow: heavy engine tests (full-pipeline parity, synthetic e2e with retrain)
